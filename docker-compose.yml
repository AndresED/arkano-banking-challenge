services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/00-init-databases.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bank']
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://kafka:9092,external://localhost:19092
      - --mode=dev-container
      - --smp=1
      - --default-log-level=warn
    ports:
      - '19092:19092'
    healthcheck:
      test: ['CMD-SHELL', 'rpk cluster health || exit 1']
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
